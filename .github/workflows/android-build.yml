name: Android Fast Build (Debug)

on:
  workflow_dispatch: # Permite ejecutar el build manualmente desde GitHub
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependencias (NPM)
        run: npm install

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generar carpeta nativa (Expo Prebuild)
        run: npx expo prebuild -p android

      - name: Dar permisos de ejecución a Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK (Standalone Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Subir APK para Descargar
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-standalone
          path: android/app/build/outputs/apk/debug/app-debug.apk
